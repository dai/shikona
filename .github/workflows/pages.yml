name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'rikishi_*.dic'
      - 'rikishi_*.txt'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy_retry.outputs.page_url || steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Retry deploy
        if: steps.deploy.outcome == 'failure'
        id: deploy_retry
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Fail when deploy retry does not recover
        if: always() && steps.deploy.outcome == 'failure' && steps.deploy_retry.outcome == 'failure'
        run: exit 1
